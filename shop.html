<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Store</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topbar">
  <div class="logo">🎴 TCG Store</div>
  <button onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
</div>

<div class="container">
  <input id="search" placeholder="🔍 Sök kort...">
  <div id="grid" class="grid"></div>
</div>

<div id="cartOverlay" onclick="toggleCart()"></div>

<div id="cart" class="cart">
  <div class="cart-header">
    <h3>Varukorg</h3>
    <button class="close-cart" onclick="toggleCart()">✖</button>
  </div>

  <div id="cartItems"></div>
  <div id="total"></div>

  <button onclick="clearCart()" style="background:#ef4444;">🧹 Töm kundvagn</button>
  <button onclick="checkout()">Checkout</button>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Checkout</h3>

    <input id="custName" placeholder="Namn">
    <input id="custEmail" placeholder="Email">
    <input id="custPhone" placeholder="Telefon">

    <div id="checkoutSummary"></div>

    <button onclick="confirmCheckout()">Köp nu</button>
    <button onclick="closeModal()">Avbryt</button>
  </div>
</div>

<div id="imgModal" class="img-modal" onclick="closeImageModal()">
  <img id="imgModalContent">
</div>

<script src="app.js"></script>
</body>
</html>
